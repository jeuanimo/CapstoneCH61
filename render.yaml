# Render.com Blueprint
# This file defines the infrastructure for your Django application.
# Deploy by connecting your GitHub repo to Render and selecting this blueprint.

databases:
  - name: chapter-db
    plan: free  # Use 'starter' or higher for production
    databaseName: chapter_database
    user: chapter_user
    region: oregon  # Choose: oregon, ohio, frankfurt, singapore

services:
  - type: web
    name: ngs1914-website
    runtime: python
    plan: free  # Use 'starter' ($7/mo) or higher for production
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    
    # Custom domain configuration
    domains:
      - ngs1914.org
      - www.ngs1914.org
    
    envVars:
      # Django Core Settings
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.6"
      
      # Security Keys (generate on Render dashboard)
      - key: SECRET_KEY
        generateValue: true
      
      # Database (auto-linked from database above)
      - key: DATABASE_URL
        fromDatabase:
          name: chapter-db
          property: connectionString
      
      # Allowed Hosts
      - key: ALLOWED_HOSTS
        value: "ngs1914.org,www.ngs1914.org"
      
      # CSRF Trusted Origins
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ngs1914.org,https://www.ngs1914.org"
      
      # Email Configuration (Namecheap Private Email)
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "mail.privateemail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "contact@ngs1914.org"
      - key: EMAIL_HOST_PASSWORD
        sync: false  # Set in Render dashboard - NEVER put password here!
      - key: DEFAULT_FROM_EMAIL
        value: "contact@ngs1914.org"
      - key: CONTACT_EMAIL
        value: "contact@ngs1914.org"
      
      # Stripe Payment (set in Render dashboard)
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      
      # Zoom Meeting SDK (set in Render dashboard)
      - key: ZOOM_MEETING_SDK_KEY
        sync: false
      - key: ZOOM_MEETING_SDK_SECRET
        sync: false
      - key: ZOOM_OAUTH_ACCOUNT_ID
        sync: false
      - key: ZOOM_OAUTH_CLIENT_ID
        sync: false
      - key: ZOOM_OAUTH_CLIENT_SECRET
        sync: false
      
      # Twilio SMS (set in Render dashboard)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      
      # Cloudinary Media Storage (free tier: 25GB storage, 25GB bandwidth/month)
      # Sign up at: https://cloudinary.com/
      # Format: cloudinary://API_KEY:API_SECRET@CLOUD_NAME
      - key: CLOUDINARY_URL
        sync: false  # Set in Render dashboard

    # Health check endpoint
    healthCheckPath: /

    # Auto-deploy on push to main branch
    autoDeploy: true

# Notes:
# 1. After first deploy, configure custom domain DNS:
#    - Add CNAME record: www -> ngs1914-website.onrender.com
#    - Add A record: @ -> Render's IP (shown in dashboard)
# 2. Set EMAIL_HOST_PASSWORD in Render Dashboard -> Environment (keep secret!)
# 3. Set CLOUDINARY_URL for persistent media storage (user uploads)
# 4. Create superuser: Render Dashboard -> Shell -> python manage.py createsuperuser
